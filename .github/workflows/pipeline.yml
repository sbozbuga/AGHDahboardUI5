name: UI5 CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Health Check (Format, Lint, UI5 Lint, Typecheck)
        run: npm run health

      - name: Run Unit Tests
        run: npm run test
        # Note: Depending on your local browser setup, test-ui5 may need additional configuration for headless execution in CI.

  build:
    name: Build
    needs: lint-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build Optimized App
        run: npm run build:opt

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ui5-dist
          path: dist/

  deploy-pi:
    name: Deploy to Raspberry Pi 5
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: ui5-dist
          path: dist-tmp

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4.1.2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-actions

      - name: Copy files to Pi 5 via SCP
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          port: 22
          source: "dist-tmp/*"
          target: "/var/www/html/aghd"
          strip_components: 1

      - name: Post-deployment via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          port: 22
          script: |
            echo "Deployment successful to $(hostname)"
            # Example: sudo systemctl restart nginx

